<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kundenportal Reservierung</title>
</head>
<body>
  <h1>Reservierung</h1>
  <p><a href="./login.html">Login</a> | <a href="./konto.html">Konto</a></p>

  <button id="loadDogs">Meine Hunde laden</button>
  <pre id="dogsOutput"></pre>

  <form id="reservationForm">
    <div><input name="dog_id" type="number" placeholder="Dog ID" required></div>
    <div><input name="checkin_date" type="date" required></div>
    <div><input name="checkout_date" type="date" required></div>
    <div><input name="plan_id" type="number" placeholder="Plan ID (optional)"></div>
    <button type="submit">Reservierung senden</button>
  </form>

  <button id="loadReservations">Meine Reservierungen laden</button>
  <pre id="reservationsOutput"></pre>

  <script src="./assets/api-client.js"></script>
  <script>
    const dogsOutput = document.getElementById("dogsOutput");
    const reservationsOutput = document.getElementById("reservationsOutput");

    document.getElementById("loadDogs").addEventListener("click", async () => {
      try {
        const res = await CustomerPortalApi.request("/customer/dogs", { auth: true });
        dogsOutput.textContent = JSON.stringify(res, null, 2);
      } catch (err) {
        dogsOutput.textContent = err.message;
      }
    });

    document.getElementById("reservationForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const payload = Object.fromEntries(new FormData(e.target).entries());
      if (!payload.plan_id) delete payload.plan_id;
      try {
        const res = await CustomerPortalApi.request("/customer/reservations", { method: "POST", body: payload, auth: true });
        reservationsOutput.textContent = JSON.stringify(res, null, 2);
      } catch (err) {
        reservationsOutput.textContent = err.message;
      }
    });

    document.getElementById("loadReservations").addEventListener("click", async () => {
      try {
        const res = await CustomerPortalApi.request("/customer/reservations", { auth: true });
        reservationsOutput.textContent = JSON.stringify(res, null, 2);
      } catch (err) {
        reservationsOutput.textContent = err.message;
      }
    });
  </script>
</body>
</html>
