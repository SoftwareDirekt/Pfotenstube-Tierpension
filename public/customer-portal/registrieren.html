<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kundenportal Registrierung</title>
</head>
<body>
  <h1>Registrierung</h1>
  <p><a href="./login.html">Zum Login</a></p>

  <label>API Base (optional): <input id="apiBase" placeholder="https://dein-backend.de/api"></label>
  <button id="saveApiBase">API Base speichern</button>

  <form id="registerForm">
    <div><input name="name" placeholder="Name" required></div>
    <div><input name="email" type="email" placeholder="E-Mail" required></div>
    <div><input name="password" type="password" placeholder="Passwort" required minlength="8"></div>
    <div><input name="password_confirmation" type="password" placeholder="Passwort wiederholen" required minlength="8"></div>
    <div><input name="phone" placeholder="Telefon"></div>
    <div><input name="street" placeholder="Straße"></div>
    <div><input name="city" placeholder="Stadt"></div>
    <div><input name="zipcode" placeholder="Postleitzahl"></div>
    <div><input name="country" placeholder="Land"></div>
    <div><label><input name="privacy_accepted" type="checkbox" required> Ich akzeptiere die Datenschutzerklaerung</label></div>
    <button type="submit">Registrieren</button>
  </form>

  <hr>

  <h2>E-Mail-Code bestaetigen</h2>
  <form id="verifyForm">
    <div><input name="email" type="email" placeholder="E-Mail" required></div>
    <div><input name="code" placeholder="6-stelliger Code" required minlength="6" maxlength="6"></div>
    <button type="submit">Code bestaetigen</button>
  </form>

  <button id="resendCode">Code erneut senden</button>
  <pre id="status"></pre>

  <script src="./assets/api-client.js"></script>
  <script>
    const statusEl = document.getElementById("status");
    document.getElementById("apiBase").value = CustomerPortalApi.getApiBase();

    document.getElementById("saveApiBase").addEventListener("click", () => {
      CustomerPortalApi.setApiBase(document.getElementById("apiBase").value);
      statusEl.textContent = "API Base gespeichert.";
    });

    document.getElementById("registerForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const form = new FormData(e.target);
      const payload = Object.fromEntries(form.entries());
      payload.privacy_accepted = !!form.get("privacy_accepted");
      try {
        const res = await CustomerPortalApi.request("/customer/auth/register", { method: "POST", body: payload });
        statusEl.textContent = JSON.stringify(res, null, 2);
      } catch (err) {
        statusEl.textContent = `${err.message}\n${JSON.stringify(err.errors || {}, null, 2)}`;
      }
    });

    document.getElementById("verifyForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const payload = Object.fromEntries(new FormData(e.target).entries());
      try {
        const res = await CustomerPortalApi.request("/customer/auth/verify-email-code", { method: "POST", body: payload });
        statusEl.textContent = JSON.stringify(res, null, 2);
      } catch (err) {
        statusEl.textContent = `${err.message}\n${JSON.stringify(err.errors || {}, null, 2)}`;
      }
    });

    document.getElementById("resendCode").addEventListener("click", async () => {
      const email = document.querySelector('#verifyForm [name="email"]').value;
      try {
        const res = await CustomerPortalApi.request("/customer/auth/resend-code", { method: "POST", body: { email } });
        statusEl.textContent = JSON.stringify(res, null, 2);
      } catch (err) {
        statusEl.textContent = `${err.message}\n${JSON.stringify(err.errors || {}, null, 2)}`;
      }
    });
  </script>
</body>
</html>
